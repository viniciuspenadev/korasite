# ─────────────────────────────────────────────────────────────────────────────
# Kora site — nginx config pra Astro estático
#
# Serve dist/ direto, com:
#   - gzip ligado (HTML/CSS/JS/SVG comprimidos no fly)
#   - cache agressivo nos assets versionados (1 ano)
#   - cache curto no index.html (1h, pra deploy refletir rápido)
#   - routing Astro-friendly (tenta arquivo, .html, pasta/index.html)
#   - healthcheck em /health pro EasyPanel monitorar
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root  /usr/share/nginx/html;
    index index.html;

    # ── Compressão ───────────────────────────────────────────────────────────
    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_min_length    1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/woff
        font/woff2;

    # ── Segurança básica ─────────────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN"              always;
    add_header X-Content-Type-Options   "nosniff"                 always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

    # ── Cache: assets com hash no nome (Astro adiciona) cacheam por 1 ano ────
    location ~* \.(js|css|woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── HTML: cache curto pra deploys refletirem rápido ──────────────────────
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # ── Healthcheck pro Docker/EasyPanel ─────────────────────────────────────
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Routing Astro: tenta arquivo, .html, pasta/index.html, 404 ──────────
    location / {
        try_files $uri $uri.html $uri/index.html $uri/ =404;
    }

    # ── Páginas de erro ──────────────────────────────────────────────────────
    error_page 404 /404.html;

    # Esconde info do servidor
    server_tokens off;
}
